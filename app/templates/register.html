<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar Cadastro</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f7; font-family:Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f4f7; padding:40px 0;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table width="480" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #e2e2e8;">

          <!-- Header -->
          <tr>
            <td style="background-color:#0f0f13; padding:28px 40px; border-bottom:1px solid #2a2a38;">
              <p style="margin:0; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#6b6b80;">Ativação de conta</p>
              <h1 style="margin:6px 0 0; font-size:20px; color:#f0f0f5; font-weight:600;">Confirmar Cadastro</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px 40px; background-color:#17171e;">

              <p style="margin:0 0 20px; font-size:14px; color:#a0a0b8; line-height:1.7;">
                Obrigado por criar sua conta. Para ativá-la, clique no botão abaixo:
              </p>

              <!-- Button -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding:4px 0 24px;">
                    <a href="{{ actionLink }}"
                       style="display:inline-block; padding:13px 32px; background-color:#4d9fff; color:#05111f; font-size:14px; font-weight:600; text-decoration:none; border-radius:8px;">
                      Confirmar Cadastro
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px;">
                <tr>
                  <td style="border-top:1px solid #2a2a38;"></td>
                </tr>
              </table>

              <p style="margin:0; font-size:12px; color:#6b6b80; line-height:1.6;">
                Ou copie e cole o link no seu navegador:<br>
                <a href="{{ actionLink }}" style="color:#4d9fff; word-break:break-all; text-decoration:none;">{{ actionLink }}</a>
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:18px 40px; background-color:#0f0f13; border-top:1px solid #2a2a38;">
              <p style="margin:0; font-size:12px; color:#6b6b80;">
                Se você não criou esta conta, ignore este e-mail.
              </p>
              <p style="margin:6px 0 0; font-size:12px; color:#3a3a4a;">© 2026 Seu Sistema</p>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>

</body>
</html>
